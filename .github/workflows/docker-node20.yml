name: Docker node 20.16.0

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # pull
          docker pull node:22-alpine
          docker tag node:22-alpine registry.cn-shanghai.aliyuncs.com/yydd/node:22-alpine
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push registry.cn-shanghai.aliyuncs.com/yydd/node:22-alpine
