name: Docker Hermes-Agent

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # дҪҝз”ЁDockerfileжһ„е»әй•ңеғҸ
          docker pull nousresearch/hermes-agent:v2026.6.19
          docker tag nousresearch/hermes-agent:v2026.6.19  registry.cn-shanghai.aliyuncs.com/yydd/hermes-agent:v2026.6.19
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push registry.cn-shanghai.aliyuncs.com/yydd/hermes-agent:v2026.6.19
