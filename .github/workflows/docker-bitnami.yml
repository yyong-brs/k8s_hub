name: Docker bitnami

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # дҪҝз”ЁDockerfileжһ„е»әй•ңеғҸ
          docker pull bitnamilegacy/postgresql:16.4.0-debian-12-r14
          docker pull bitnamilegacy/valkey:8.1.3-debian-12-r3
          docker tag bitnamilegacy/postgresql:16.4.0-debian-12-r14  registry.cn-shanghai.aliyuncs.com/yydd/bitnami:postgresql-16.4.0-debian-12-r14
          docker tag bitnamilegacy/valkey:8.1.3-debian-12-r3  registry.cn-shanghai.aliyuncs.com/yydd/bitnami:valkey-8.1.3-debian-12-r3
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push registry.cn-shanghai.aliyuncs.com/yydd/bitnami:postgresql-16.4.0-debian-12-r14
          docker push registry.cn-shanghai.aliyuncs.com/yydd/bitnami:valkey-8.1.3-debian-12-r3
