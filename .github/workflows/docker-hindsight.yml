name: Docker hindsight

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # дҪҝз”ЁDockerfileжһ„е»әй•ңеғҸ
          docker pull ghcr.io/vectorize-io/hindsight-api:0.5.4
          docker tag ghcr.io/vectorize-io/hindsight-api:0.5.4 registry.cn-shanghai.aliyuncs.com/yydd/hindsight:hindsight-api-0.5.4
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push registry.cn-shanghai.aliyuncs.com/yydd/hindsight:hindsight-api-0.5.4
