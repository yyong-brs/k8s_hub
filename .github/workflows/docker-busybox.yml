name: Docker Busybox

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # дҪҝз”ЁDockerfileжһ„е»әй•ңеғҸ
          docker pull ghcr.io/element-hq/synapse:v1.151.0
          docker tag ghcr.io/element-hq/synapse:v1.151.0 registry.cn-shanghai.aliyuncs.com/yydd/busybox:synapse-v1.151.0
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push registry.cn-shanghai.aliyuncs.com/yydd/busybox:synapse-v1.151.0
