name: Docker Busybox

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # зҷ»еҪ•йҳҝйҮҢдә‘й•ңеғҸд»“еә“
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # дҪҝз”ЁDockerfileжһ„е»әй•ңеғҸ
          docker pull sonatype/nexus3:3.38.1
          docker tag sonatype/nexus3:3.38.1 registry.cn-shanghai.aliyuncs.com/yydd/busybox:nexus3-3.38.1
          # жҺЁйҖҒй•ңеғҸеҲ°й•ңеғҸд»“еә“
          docker push registry.cn-shanghai.aliyuncs.com/yydd/busybox:nexus3-3.38.1
