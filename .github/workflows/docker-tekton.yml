name: Docker Tekton

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build the Docker image
        run: |
          docker version
          # 登录阿里云镜像仓库
          docker login --username=${{ secrets.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }} registry.cn-shanghai.aliyuncs.com
          # 使用Dockerfile构建镜像
          docker pull ghcr.io/tektoncd/pipeline/controller-10a3e32792f33651396d02b6855a6e36:v1.13.0@sha256:f16f27c4cae8013e4d0f51b3a208d9367dd9a383d7ec9dea623068ece9180838
          docker pull ghcr.io/tektoncd/pipeline/events-a9042f7efb0cbade2a868a1ee5ddd52c:v1.13.0@sha256:3f691419fdb79b8824e4184b4e1d41200d950b543b134b5a5c7fdf46234c9114
          docker pull ghcr.io/tektoncd/pipeline/resolvers-ff86b24f130c42b88983d3c13993056d:v1.13.0@sha256:6baeb2aa990387ed4afed4fa095845ed137b35c2471dffdc95ea8d32142775fa
          docker pull ghcr.io/tektoncd/pipeline/webhook-d4749e605405422fd87700164e31b2d1:v1.13.0@sha256:4eb2519b2272a7b049bb721e1ebe00f2cb92d22b8c7fdee369924d690439684a
          
          docker tag ghcr.io/tektoncd/pipeline/controller-10a3e32792f33651396d02b6855a6e36:v1.13.0@sha256:f16f27c4cae8013e4d0f51b3a208d9367dd9a383d7ec9dea623068ece9180838 registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-controller-v1.13.0
          docker tag ghcr.io/tektoncd/pipeline/events-a9042f7efb0cbade2a868a1ee5ddd52c:v1.13.0@sha256:3f691419fdb79b8824e4184b4e1d41200d950b543b134b5a5c7fdf46234c9114 registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-events-v1.13.0
          docker tag ghcr.io/tektoncd/pipeline/resolvers-ff86b24f130c42b88983d3c13993056d:v1.13.0@sha256:6baeb2aa990387ed4afed4fa095845ed137b35c2471dffdc95ea8d32142775fa registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-resolvers-v1.13.0
          docker tag ghcr.io/tektoncd/pipeline/webhook-d4749e605405422fd87700164e31b2d1:v1.13.0@sha256:4eb2519b2272a7b049bb721e1ebe00f2cb92d22b8c7fdee369924d690439684a registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-webhook-v1.13.0
          # 推送镜像到镜像仓库
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-controller-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-events-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-resolvers-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-webhook-v1.13.0

          # pipeline controller args 中依赖的镜像
          docker pull ghcr.io/tektoncd/pipeline/entrypoint-bff0a22da108bc2f16c818c97641a296:v1.13.0@sha256:c12dc318440a2ab96d83daeb5e70a223e59d87a0c3f1f391b1ed1e4ecb092602	
          docker pull ghcr.io/tektoncd/pipeline/nop-8eac7c133edad5df719dc37b36b62482:v1.13.0@sha256:15c6f4a42b9253beb46682fbf0771519b241af13c4f916cfc400b827a7bd8dda	
          docker pull ghcr.io/tektoncd/pipeline/sidecarlogresults-7501c6a20d741631510a448b48ab098f:v1.13.0@sha256:f23ee3e2686bf7af0322b7f47363a9e5e15e3faf36efb83f3a82a7769be37522
          docker pull ghcr.io/tektoncd/pipeline/workingdirinit-0c558922ec6a1b739e550e349f2d5fc1:v1.13.0@sha256:4e6e3896c4c46c5f4de098e1dd9c3ad52687091b80db015b1cd7adf031cd3c65
          docker pull cgr.dev/chainguard/busybox@sha256:19f02276bf8dbdd62f069b922f10c65262cc34b710eea26ff928129a736be791
          ## power shell 的用不到应该，而且pull linx 下报错
          # docker pull mcr.microsoft.com/powershell:nanoserver@sha256:b6d5ff841b78bdf2dfed7550000fd4f3437385b8fa686ec0f010be24777654d6

          docker tag ghcr.io/tektoncd/pipeline/entrypoint-bff0a22da108bc2f16c818c97641a296:v1.13.0@sha256:c12dc318440a2ab96d83daeb5e70a223e59d87a0c3f1f391b1ed1e4ecb092602 registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-entrypoint-v1.13.0
          docker tag ghcr.io/tektoncd/pipeline/nop-8eac7c133edad5df719dc37b36b62482:v1.13.0@sha256:15c6f4a42b9253beb46682fbf0771519b241af13c4f916cfc400b827a7bd8dda registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-nop-v1.13.0
          docker tag ghcr.io/tektoncd/pipeline/sidecarlogresults-7501c6a20d741631510a448b48ab098f:v1.13.0@sha256:f23ee3e2686bf7af0322b7f47363a9e5e15e3faf36efb83f3a82a7769be37522 registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-sidecarlogresults-v1.13.0
          docker tag ghcr.io/tektoncd/pipeline/workingdirinit-0c558922ec6a1b739e550e349f2d5fc1:v1.13.0@sha256:4e6e3896c4c46c5f4de098e1dd9c3ad52687091b80db015b1cd7adf031cd3c65 registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-workingdirinit-v1.13.0
          docker tag cgr.dev/chainguard/busybox@sha256:19f02276bf8dbdd62f069b922f10c65262cc34b710eea26ff928129a736be791 registry.cn-shanghai.aliyuncs.com/yydd/busybox:19f02276bf8dbdd62f069b922f10c65262cc34b710eea26ff928129a736be791
          # docker tag mcr.microsoft.com/powershell:nanoserver@sha256:b6d5ff841b78bdf2dfed7550000fd4f3437385b8fa686ec0f010be24777654d6 registry.cn-shanghai.aliyuncs.com/yydd/tekton:powershell-nanoserver

          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-entrypoint-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-nop-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-sidecarlogresults-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:pipeline-workingdirinit-v1.13.0
          docker push registry.cn-shanghai.aliyuncs.com/yydd/busybox:19f02276bf8dbdd62f069b922f10c65262cc34b710eea26ff928129a736be791
          # docker push registry.cn-shanghai.aliyuncs.com/yydd/tekton:powershell-nanoserver
